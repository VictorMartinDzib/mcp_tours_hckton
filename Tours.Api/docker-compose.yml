services:
  postgres:
    image: postgres:16-alpine
    container_name: tours-postgres
    environment:
      POSTGRES_DB: tours
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tours-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tours"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tours-postgres-data:
